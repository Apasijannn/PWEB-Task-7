<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar - Ruang Sintaks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Pindahkan ini ke style.css milikmu nanti */
    :root {
      --bg-warm: #f4f1ea; 
      --accent: #dd5b43;  
      --text-dark: #1a1a1a;
      --card-radius: 1.5rem;
    }

    body {
      background-color: var(--bg-warm);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-dark);
    }
    
    h1, h2, .font-syne {
      font-family: 'Syne', sans-serif;
    }

    .bg-white-custom {
      background-color: #ffffff;
      border-radius: var(--card-radius);
    }

    /* Kustomisasi Input Form Bootstrap */
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.25rem rgba(221, 91, 67, 0.25);
    }
    .custom-input {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
    }

    .btn-accent {
      background-color: var(--accent);
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.8rem;
    }
    .btn-accent:hover {
      background-color: #c44a33;
      color: white;
    }
    .text-accent {
      color: var(--accent);
    }
    
    /* Kustomisasi Checkbox */
    .form-check-input:checked {
      background-color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    
    <div class="bg-white-custom shadow-sm p-4 p-md-5 w-100 border-0" style="max-width: 650px;">
      
      <div class="text-center mb-5">
        <h2 class="fw-bold font-syne mb-2">Buat Akun Ruang<span class="text-accent">Sintaks</span></h2>
        <p class="text-muted">Akses semua modul dan mulai perjalanan ngodingmu secara gratis.</p>
      </div>

      <form>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <input type="text" class="form-control custom-input" placeholder="Nama Depan" required>
          </div>
          <div class="col-md-6">
            <input type="text" class="form-control custom-input" placeholder="Nama Belakang" required>
          </div>
        </div>

        <div class="mb-3">
          <input type="text" class="form-control custom-input" placeholder="Nama Panggilan" required>
        </div>

        <div class="mb-3">
          <input type="email" class="form-control custom-input" placeholder="Alamat Email" required>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <input type="password" class="form-control custom-input" placeholder="Kata Sandi" required>
          </div>
          <div class="col-md-6">
            <input type="password" class="form-control custom-input" placeholder="Konfirmasi Kata Sandi" required>
          </div>
        </div>

        <div class="d-flex align-items-start mb-4 bg-light p-3 rounded-3 border">
          <div class="form-check mt-1 me-2">
            <input class="form-check-input" type="checkbox" id="termsCheck" required>
          </div>
          <label class="form-check-label text-muted small" for="termsCheck">
            Saya Setuju. Dengan menekan tombol daftar, Anda menyetujui <a href="#" class="text-accent text-decoration-none fw-semibold">Syarat & Ketentuan</a> serta Kebijakan Privasi yang berlaku di situs ini.
          </label>
        </div>

        <hr class="my-4 opacity-25">

        <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill mb-3">Daftar Sekarang</button>
        
        <p class="text-center text-muted mt-3 mb-0">
          Sudah punya akun? <a href="#" class="text-accent text-decoration-none fw-bold">Masuk di sini</a>
        </p>

      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
